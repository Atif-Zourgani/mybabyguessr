home:
    seo:
        title: "Jogo de apostas do bebé grátis online"
        description: "Crie o seu jogo de apostas do bebé em 2 min. Família e amigos adivinham nome, data, peso e sexo, sem conta. Partilhe apenas um link."
    hero:
        title: "Faça a sua família adivinhar a chegada do bebé"
        subtitle: "Adivinha. Partilha. Aprecia."
        description: "Crie o seu jogo de apostas do bebé em minutos. Família, amigos e colegas adivinham o nome, a data de nascimento, o peso e o sexo, sem criar conta. Apenas um link para partilhar."
        cta_register: "Criar o meu jogo grátis"
        cta_login: "Iniciar sessão"
    how:
        title: "Como funciona?"
        step1_title: "Crie o seu jogo de apostas"
        step1_desc: "Registe-se e configure o seu Baby Guessr em poucos cliques : escolha o que os seus entes queridos vão adivinhar."
        step2_title: "Partilhe o link"
        step2_desc: "Envie o seu link por WhatsApp, SMS ou email. Não é necessária conta para participar, os seus convidados jogam diretamente."
        step3_title: "Aprecie as apostas"
        step3_desc: "Consulte todas as respostas, compare as opiniões e aprecie o momento em família. A revelação das respostas reais? Opcional : no site ou pessoalmente, decide você."
    features:
        title: "Tudo o que precisa"
        subtitle: "Um jogo de apostas do bebé simples, gratuito e sem complicações para os seus convidados."
        feature1_title: "Até 5 categorias para adivinhar"
        feature1_desc: "Nome, sexo, data de nascimento, peso, tamanho : escolha uma ou várias categorias como preferir."
        feature2_title: "Partilha instantânea"
        feature2_desc: "Um link único para enviar por WhatsApp, SMS ou email. Funciona em todos os dispositivos, sem aplicação."
        feature3_title: "Sem conta necessária"
        feature3_desc: "Os seus convidados clicam no link e jogam diretamente, sem registo, sem complicações."
        feature4_title: "Multilingue"
        feature4_desc: "O jogo adapta-se automaticamente ao idioma de cada convidado."
        feature5_title: "100% gratuito"
        feature5_desc: "Crie e partilhe o seu jogo gratuitamente. Sem cartão de crédito, sem subscrição."
    cta:
        title: "Prontos para criar o suspense?"
        button: "Criar o meu jogo de apostas"
    faq:
        title: "Perguntas frequentes"
        q1: "O que é um jogo de apostas do bebé?"
        a1: "É um jogo online onde convida família e amigos a adivinhar informações sobre o seu bebé: nome, sexo, data de nascimento, peso e tamanho. Cada um faz as suas apostas através de um link partilhado, sem criar conta."
        q2: "O MyBabyGuessr é gratuito?"
        a2: "Sim, completamente gratuito. Crie a sua conta, lance o seu jogo e partilhe o link, sem cartão de crédito nem subscrição."
        q3: "Os meus convidados precisam de criar conta para jogar?"
        a3: "Não. Os seus convidados recebem um link e participam diretamente, sem registo. Um único clique é suficiente para jogar."
        q4: "Pode usar-se o MyBabyGuessr para um baby shower ou um gender reveal?"
        a4: "Com certeza. O MyBabyGuessr é perfeito para animar um baby shower online, um gender reveal com a família à distância, ou simplesmente manter os seus entes queridos envolvidos durante toda a gravidez."
        q5: "Como se partilha o link do jogo?"
        a5: "Após criar o seu jogo, recebe um link único para enviar por WhatsApp, SMS, email ou qualquer rede social, com um clique na página de partilha."
        q6: "Quando se revelam os resultados?"
        a6: "Você controla o momento. As apostas são visíveis no seu painel a qualquer momento. Revela as respostas reais quando quiser, após o nascimento ou antes."

