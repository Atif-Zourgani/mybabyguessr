home:
    seo:
        title: "Gioco di pronostici sul bebè gratis online"
        description: "Crea il tuo gioco di pronostici sul bebè in pochi minuti. Famiglia e amici indovinano nome, data di nascita, peso e sesso — senza creare un account. Basta condividere un link."
    hero:
        title: "Fai indovinare alla tua famiglia l'arrivo del bebè"
        subtitle: "Indovina. Condividi. Scopri."
        description: "Crea il tuo gioco di pronostici sul bebè in pochi minuti. Famiglia, amici e colleghi indovinano nome, data di nascita, peso e sesso — senza account. Solo un link da condividere."
        cta_register: "Crea il mio gioco gratis"
        cta_login: "Accedi"
    how:
        title: "Come funziona?"
        step1_title: "Crea il tuo gioco di pronostici"
        step1_desc: "Registrati e configura il tuo Baby Guessr in pochi clic — scegli cosa i tuoi cari dovranno indovinare."
        step2_title: "Condividi il link"
        step2_desc: "Invia il tuo link via WhatsApp, SMS o e-mail. Nessun account necessario — i tuoi invitati giocano direttamente."
        step3_title: "Goditi i pronostici"
        step3_desc: "Guarda tutte le risposte, confronta le opinioni e goditi il momento in famiglia. La rivelazione delle risposte vere? Opzionale — sul sito o di persona, decidi tu."
    features:
        title: "Tutto ciò di cui hai bisogno"
        subtitle: "Un gioco di pronostici semplice, gratuito e senza complicazioni per i tuoi ospiti."
        feature1_title: "Fino a 5 categorie da indovinare"
        feature1_desc: "Nome, sesso, data di nascita, peso, altezza — scegli una o più categorie come preferisci."
        feature2_title: "Condivisione immediata"
        feature2_desc: "Un link unico da inviare via WhatsApp, SMS o e-mail. Funziona su tutti i dispositivi, senza app."
        feature3_title: "Nessun account necessario"
        feature3_desc: "I tuoi ospiti cliccano sul link e giocano subito — senza registrazione, senza complicazioni."
        feature4_title: "Multilingue"
        feature4_desc: "Il gioco si adatta automaticamente alla lingua di ogni ospite."
        feature5_title: "100% gratuito"
        feature5_desc: "Crea e condividi il tuo gioco gratuitamente. Nessuna carta di credito, nessun abbonamento."
    cta:
        title: "Pronti a creare la suspense?"
        button: "Crea il mio gioco di pronostici"
    faq:
        title: "Domande frequenti"
        q1: "Cos'è un gioco di pronostici sul bebè?"
        a1: "È un gioco online dove inviti famiglia e amici a indovinare informazioni sul tuo bebè: nome, sesso, data di nascita, peso e altezza. Ognuno fa i suoi pronostici tramite un link condiviso, senza account."
        q2: "MyBabyGuessr è gratuito?"
        a2: "Sì, completamente gratuito. Crea il tuo account, lancia il tuo gioco e condividi il link — nessuna carta di credito, nessun abbonamento."
        q3: "I miei ospiti devono creare un account per giocare?"
        a3: "No. I tuoi ospiti ricevono un link e partecipano direttamente — senza registrazione. Un solo clic basta per giocare."
        q4: "Si può usare MyBabyGuessr per un baby shower o un gender reveal?"
        a4: "Certo. MyBabyGuessr è perfetto per animare un baby shower online, organizzare un gender reveal con la famiglia lontana, o tenere i tuoi cari coinvolti per tutta la gravidanza."
        q5: "Come condivido il link del gioco?"
        a5: "Dopo aver creato il tuo gioco, ricevi un link unico da inviare via WhatsApp, SMS, e-mail o social — con un clic sulla pagina di condivisione."
        q6: "Quando vengono rivelati i risultati?"
        a6: "Decidi tu il momento. I pronostici sono visibili nella tua dashboard in qualsiasi momento. Rivela le risposte vere quando vuoi — dopo la nascita o prima."

