home:
    seo:
        title: "Kostenloses Baby-Tippspiel online"
        description: "Erstelle dein Baby-Tippspiel in 2 Min. Familie und Freunde tippen auf Name, Datum, Gewicht und Geschlecht, ohne Konto. Nur ein Link."
    hero:
        title: "Lass deine Familie auf die Ankunft des Babys tippen"
        subtitle: "Tippen. Teilen. Erleben."
        description: "Erstelle dein Baby-Tippspiel in Minuten. Familie, Freunde und Kollegen tippen auf Name, Geburtsdatum, Gewicht und Geschlecht, ohne Konto. Nur ein Link zum Teilen."
        cta_register: "Mein Spiel kostenlos erstellen"
        cta_login: "Anmelden"
    how:
        title: "Wie funktioniert's?"
        step1_title: "Erstelle dein Tippspiel"
        step1_desc: "Registriere dich und richte deinen Baby Guessr in wenigen Klicks ein : wähle, was deine Lieben erraten sollen."
        step2_title: "Teile den Link"
        step2_desc: "Verschicke deinen Link per WhatsApp, SMS oder E-Mail. Kein Konto nötig, deine Gäste spielen direkt."
        step3_title: "Genieße die Tipps"
        step3_desc: "Sieh alle Antworten, vergleiche die Meinungen und genieße den Moment mit deiner Familie. Die Enthüllung der echten Antworten? Optional : auf der Website oder persönlich, du entscheidest."
    features:
        title: "Alles, was du brauchst"
        subtitle: "Ein einfaches, kostenloses Baby-Tippspiel, ganz unkompliziert für deine Gäste."
        feature1_title: "Bis zu 5 Kategorien zum Tippen"
        feature1_desc: "Name, Geschlecht, Geburtsdatum, Gewicht, Größe : wähle eine oder mehrere Kategorien wie du möchtest."
        feature2_title: "Sofort teilen"
        feature2_desc: "Ein einzigartiger Link zum Verschicken per WhatsApp, SMS oder E-Mail. Funktioniert auf allen Geräten, ohne App."
        feature3_title: "Kein Konto nötig"
        feature3_desc: "Deine Gäste klicken auf den Link und spielen direkt, ohne Registrierung, ohne Umwege."
        feature4_title: "Mehrsprachig"
        feature4_desc: "Das Spiel passt sich automatisch an die Sprache jedes Gastes an."
        feature5_title: "100% kostenlos"
        feature5_desc: "Erstelle und teile dein Spiel kostenlos. Keine Kreditkarte, kein Abo."
    cta:
        title: "Bereit, die Spannung zu steigern?"
        button: "Mein Tippspiel erstellen"
    faq:
        title: "Häufige Fragen"
        q1: "Was ist ein Baby-Tippspiel?"
        a1: "Ein Online-Spiel, bei dem du Familie und Freunde einlädst, Informationen über dein Baby zu erraten: Name, Geschlecht, Geburtsdatum, Gewicht und Größe. Jeder tippt über einen geteilten Link, ohne Konto."
        q2: "Ist MyBabyGuessr kostenlos?"
        a2: "Ja, komplett kostenlos. Erstelle dein Konto, starte dein Spiel und teile den Link, keine Kreditkarte, kein Abo."
        q3: "Müssen meine Gäste ein Konto erstellen, um zu spielen?"
        a3: "Nein. Deine Gäste erhalten einen Link und spielen direkt, ohne Registrierung. Ein Klick reicht zum Spielen."
        q4: "Kann MyBabyGuessr für eine Baby-Party oder ein Gender Reveal genutzt werden?"
        a4: "Natürlich. MyBabyGuessr ist perfekt, um eine Baby-Party aufzulockern, ein Gender Reveal mit entfernter Familie zu gestalten, oder deine Lieben die ganze Schwangerschaft über einzubeziehen."
        q5: "Wie teile ich den Spiel-Link?"
        a5: "Nach dem Erstellen deines Spiels erhältst du einen einzigartigen Link zum Verschicken per WhatsApp, SMS, E-Mail oder in sozialen Netzwerken, mit einem Klick auf der Teilenseite."
        q6: "Wann werden die Ergebnisse enthüllt?"
        a6: "Du bestimmst den Zeitpunkt. Die Tipps sind jederzeit in deinem Dashboard sichtbar. Enthülle die echten Antworten wann immer du möchtest, nach der Geburt oder schon vorher."

