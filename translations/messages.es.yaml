home:
    seo:
        title: "Juego de pronósticos bebé gratis online"
        description: "Crea tu juego de pronósticos bebé en minutos. Familia y amigos adivinan el nombre, la fecha de nacimiento, el peso y el sexo — sin crear cuenta. Solo comparte un enlace."
    hero:
        title: "Haz que toda tu familia adivine la llegada del bebé"
        subtitle: "Adivina. Comparte. Disfruta."
        description: "Crea tu juego de pronósticos bebé en minutos. Familia, amigos y compañeros adivinan el nombre, la fecha de nacimiento, el peso y el sexo — sin crear cuenta. Solo un enlace para compartir."
        cta_register: "Crear mi juego gratis"
        cta_login: "Iniciar sesión"
    how:
        title: "¿Cómo funciona?"
        step1_title: "Crea tu juego de pronósticos"
        step1_desc: "Regístrate y configura tu Baby Guessr en unos pocos clics — elige qué adivinarán tus seres queridos."
        step2_title: "Comparte el enlace"
        step2_desc: "Envía tu enlace por WhatsApp, SMS o email. No se necesita cuenta para jugar — tus invitados participan directamente."
        step3_title: "Disfruta de los pronósticos"
        step3_desc: "Consulta todas las respuestas, compara las opiniones y disfruta el momento en familia. ¿Revelar las respuestas reales? Opcional — en el sitio o en persona, tú decides."
    features:
        title: "Todo lo que necesitas"
        subtitle: "Un juego de pronósticos bebé simple, gratuito y sin complicaciones para tus invitados."
        feature1_title: "5 categorías para adivinar"
        feature1_desc: "Nombre, sexo, fecha de nacimiento, peso, talla — elige una o varias categorías como quieras."
        feature2_title: "Compartir al instante"
        feature2_desc: "Un enlace único para enviar por WhatsApp, SMS o email. Funciona en todos los dispositivos, sin aplicación."
        feature3_title: "Sin cuenta necesaria"
        feature3_desc: "Tus invitados hacen clic en el enlace y juegan directamente — sin registro, sin complicaciones."
        feature4_title: "Multilingüe"
        feature4_desc: "El juego se adapta automáticamente al idioma de cada invitado."
        feature5_title: "100% gratis"
        feature5_desc: "Crea y comparte tu juego gratis. Sin tarjeta de crédito, sin suscripción."
    cta:
        title: "¿Listos para crear el suspense?"
        button: "Crear mi juego de pronósticos"
    faq:
        title: "Preguntas frecuentes"
        q1: "¿Qué es un juego de pronósticos bebé?"
        a1: "Es un juego online donde invitas a familia y amigos a adivinar información sobre tu bebé por nacer: nombre, sexo, fecha de nacimiento, peso y talla. Cada uno hace sus pronósticos a través de un enlace compartido, sin crear cuenta."
        q2: "¿Es MyBabyGuessr gratuito?"
        a2: "Sí, completamente gratis. Crea tu cuenta, lanza tu juego y comparte el enlace — sin tarjeta de crédito ni suscripción."
        q3: "¿Mis invitados necesitan crear una cuenta para jugar?"
        a3: "No. Tus invitados reciben un enlace y participan directamente, sin registro. Un solo clic es suficiente para jugar."
        q4: "¿Se puede usar MyBabyGuessr para un baby shower o un gender reveal?"
        a4: "Por supuesto. MyBabyGuessr es perfecto para animar un baby shower online, un gender reveal con la familia a distancia, o simplemente mantener a tus seres queridos involucrados durante todo el embarazo."
        q5: "¿Cómo se comparte el enlace del juego?"
        a5: "Después de crear tu juego, recibes un enlace único para enviar por WhatsApp, SMS, email o cualquier red social — en un clic desde la página de compartir."
        q6: "¿Cuándo se revelan los resultados?"
        a6: "Tú controlas el momento. Los pronósticos son visibles en tu panel en cualquier momento. Revelas las respuestas reales cuando quieras — después del nacimiento o antes."

