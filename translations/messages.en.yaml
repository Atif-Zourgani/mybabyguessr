home:
    seo:
        title: "Free Baby Guessing Game Online"
        description: "Create a free baby guessing game in minutes. Family and friends guess name, due date, weight and gender — no account needed. Just share a link."
    hero:
        title: "Let your whole family guess baby's arrival"
        subtitle: "Guess. Share. Reveal."
        description: "Create your free baby guessing game in minutes. Family, friends and colleagues guess name, due date, weight and gender — no account needed. Just share a link."
        cta_register: "Create my free game"
        cta_login: "Sign in"
    how:
        title: "How it works"
        step1_title: "Create your guessing game"
        step1_desc: "Sign up and set up your Baby Guessr in a few clicks — choose what your loved ones will guess."
        step2_title: "Share the link"
        step2_desc: "Send your link via WhatsApp, SMS or email. No account needed to play — guests join directly."
        step3_title: "Reveal the surprise"
        step3_desc: "Browse all predictions, see who guessed right, and reveal the surprise whenever you're ready."
    features:
        title: "Everything you need"
        subtitle: "A simple, free, friction-free baby guessing game for your guests."
        feature1_title: "5 categories to guess"
        feature1_desc: "Name, gender, due date, weight, length — choose one or several categories as you like."
        feature2_title: "Instant sharing"
        feature2_desc: "One unique link to send via WhatsApp, SMS or email. Works on all devices, no app required."
        feature3_title: "No account required"
        feature3_desc: "Guests click the link and play directly — zero sign-up, zero friction."
        feature4_title: "French & English"
        feature4_desc: "The game automatically adapts to each guest's language."
        feature5_title: "100% free"
        feature5_desc: "Create and share your game for free. No credit card, no subscription."
    cta:
        title: "Ready to build the suspense?"
        button: "Create my guessing game"
    faq:
        title: "Frequently asked questions"
        q1: "What is a baby guessing game?"
        a1: "It's an online game where you invite family and friends to predict details about your unborn baby: name, gender, due date, weight and length. Everyone submits their guesses via a shared link — no account needed."
        q2: "Is MyBabyGuessr free?"
        a2: "Yes, completely free. Create your account, launch your game and share the link — no credit card or subscription required."
        q3: "Do my guests need to create an account to play?"
        a3: "No. Guests receive a link and join directly, no sign-up needed. One click is all it takes to play."
        q4: "Can I use MyBabyGuessr for a baby shower or gender reveal?"
        a4: "Absolutely. MyBabyGuessr is perfect for a virtual baby shower, a gender reveal with remote family, or simply keeping your loved ones involved throughout the pregnancy."
        q5: "How do I share the game link?"
        a5: "After creating your game, you get a unique link to send via WhatsApp, SMS, email or any social network — in one click from the share page."
        q6: "When do you reveal the results?"
        a6: "You control the timing. Predictions are visible in your dashboard at any time. You reveal the real answers whenever you choose — after the birth or before."

