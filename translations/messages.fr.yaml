    how:
        title: "Comment ça marche ?"
        step1_title: "Créez votre jeu de pronostics"
        step1_desc: "Inscrivez-vous et configurez votre Baby Guessr en quelques clics — choisissez ce que vos proches devineront."
        step2_title: "Partagez le lien"
        step2_desc: "Envoyez votre lien par WhatsApp, SMS ou email. Aucun compte requis pour participer — vos invités jouent directement."
        step3_title: "Révélez la surprise"
        step3_desc: "Consultez tous les pronostics, découvrez qui a vu juste, et révélez la surprise quand vous le souhaitez."
    features:
        title: "Tout ce dont vous avez besoin"
        subtitle: "Un jeu de pronostics bébé simple, gratuit et sans friction pour vos invités."
        feature1_title: "5 catégories à deviner"
        feature1_desc: "Prénom, sexe, date de naissance, poids, taille — choisissez une ou plusieurs catégories selon l'envie."
        feature2_title: "Partage instantané"
        feature2_desc: "Un lien unique à envoyer par WhatsApp, SMS ou email. Fonctionne sur tous les appareils, sans application."
        feature3_title: "Aucun compte requis"
        feature3_desc: "Vos invités cliquent sur le lien et jouent directement — zéro inscription, zéro friction."
        feature4_title: "Français & English"
        feature4_desc: "Le jeu s'adapte automatiquement à la langue de chaque invité."
        feature5_title: "100% gratuit"
        feature5_desc: "Créez et partagez votre jeu gratuitement. Aucune carte bancaire, aucun abonnement."
    cta:
        title: "Prêts à créer le suspense ?"
        button: "Créer mon jeu de pronostics"
    faq:
        title: "Questions fréquentes"
        q1: "Qu'est-ce qu'un jeu de pronostics bébé ?"
        a1: "C'est un jeu en ligne où vous invitez famille et amis à deviner des informations sur votre bébé à naître : prénom, sexe, date de naissance, poids, taille. Chacun fait ses pronostics via un lien partagé, sans créer de compte."
        q2: "Est-ce que MyBabyGuessr est gratuit ?"
        a2: "Oui, entièrement gratuit. Créez votre compte, lancez votre jeu et partagez le lien — sans aucune carte bancaire ni abonnement."
        q3: "Mes invités doivent-ils créer un compte pour jouer ?"
        a3: "Non. Vos invités reçoivent un lien et participent directement, sans inscription. Un seul clic suffit pour jouer."
        q4: "Peut-on utiliser MyBabyGuessr pour un baby shower ou un gender reveal ?"
        a4: "Absolument. MyBabyGuessr est parfait pour animer un baby shower en ligne, un gender reveal avec la famille à distance, ou simplement impliquer vos proches tout au long de la grossesse."
        q5: "Comment partager le lien du jeu ?"
        a5: "Après avoir créé votre jeu, vous recevez un lien unique à envoyer par WhatsApp, SMS, email ou n'importe quel réseau social — en un clic depuis la page de partage."
        q6: "Quand révèle-t-on les résultats ?"
        a6: "Vous restez maître du timing. Les pronostics sont visibles dans votre tableau de bord à tout moment. Vous révélez les vraies réponses quand vous le souhaitez — après la naissance ou avant."

