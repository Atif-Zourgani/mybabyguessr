        title: "Jeu de pronostics bébé en ligne gratuit"
        description: "Créez votre jeu de pronostics bébé en 2 minutes. Famille et amis devinent le prénom, la date de naissance, le poids et le sexe — sans créer de compte. Partagez juste un lien."
    hero:
        title: "Faites deviner bébé à toute votre famille"
        subtitle: "Devine. Partage. Révèle."
        description: "Créez votre jeu de pronostics bébé en 2 minutes. Famille, amis et collègues devinent le prénom, la date de naissance, le poids et le sexe — sans créer de compte. Juste un lien à partager."
